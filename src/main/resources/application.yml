spring:
  profiles:
    active: dev
  application:
    name: fruitly-api
  graphql:
    path: /graphql
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            - endpoint: ${keyvault-endpoint}
  datasource:
    url: ${spring-datasource-url} # Maps to EV
    username: ${spring-datasource-username} # Maps to KV secret
    password: ${spring-datasource-password} # Maps to KV secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# This block MUST be aligned exactly like this
app:
  cors:
    allowed-origins:
      "http://localhost:5173, http://localhost:4173"
  main:
    banner-mode: "off"

jwt:
  secret-key: ${jwt-secret-key} # Maps to KV secret
  expiration: 86400000
  refreshExpirationMs: 604800000

logging:
  level:
    root: ERROR
    com.example: INFO
    org.springframework.security: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html